<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 128 128">
    <rect width="100%" height="100%" rx="100"/>
    <style>
        rect {
            fill: #000;
            stroke: #fff;
            stroke-width: 1;
        }
        @media (prefers-color-scheme: dark) {
